name: Release

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            tag_name="${GITHUB_REF_NAME}"
          else
            tag_name="$(python -c 'import json; from pathlib import Path; print(json.loads(Path("custom_components/visual_dashboard_editor/manifest.json").read_text())["version"])')"
          fi
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
        run: |
          gh release view "$TAG_NAME" >/dev/null 2>&1 && exit 0
          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --notes "See CHANGELOG.md for changes."
